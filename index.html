<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="./jquery.min.js"></script>
</head>

<body>
    <header>
        <a href="./#FFF">white</a>
        <a href="./#000">black</a>
        <a href="./#334">blue-grey</a>
        <a href="./#stripes">stripes</a>
        <a href="./#fringe">fringe</a>
    </header>
    <main>

    </main>
</body>

<script>
    $(window).on('hashchange', (e) => {
        var hash = window.location.hash;

        $('main').html('');

        if (hash === '#stripes') {
            const stripe = `<div class="stripe"></div><div class="stripe"></div>`;

            var stripes = '';

            for (let i = 0; i < 25; i++) {
                stripes += stripe;
            }

            $('body').css('background-color', '#FFF');
            $('main').html(stripes);
        } else if (hash === '#fringe') {
            const content = `<div class="fringe"><p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed fringilla, nunc vitae auctor laoreet, ipsum eros dictum nibh, ac molestie sem justo nec est. Mauris at lectus in nunc vehicula rhoncus. Vivamus id nibh non eros fringilla congue nec a urna. Ut volutpat facilisis nisi sed ornare. Pellentesque nibh ante, sollicitudin ut elementum eget, rutrum eu lacus. Proin hendrerit eu felis sed sollicitudin. Vestibulum finibus blandit fringilla. Vestibulum eu sagittis nibh, ac interdum magna. Cras sed volutpat augue. Cras nec enim vel felis ultrices sollicitudin. Pellentesque eleifend mauris et purus aliquet dictum. Proin sit amet sapien enim.</p></div>`;

            var main = '';

            for (let i = 0; i < 25; i++) {
                main += content;
            }

            $('body').css('background-color', '#FFF');
            $('main').html(main);
        } else {
            $('body').css('background-color', hash);
        }
    });
</script>
<style>
    * {
        font-family: sans-serif;
        margin: 0;
        padding: 0;
    }

    header {
        display: flex;
        flex-direction: row;
        justify-content: center;

        a {
            display: block;
            text-align: center;
            padding: 0.6em 0.8em;
            color: #334;
            background-color: #FFF;
        }
    }

    main {
        min-height: 5800px;

        div.stripe {
            height: 240px;
        }

        div.stripe:nth-child(even) {
            background-color: #242424;
        }

        div.fringe {
            background-color: #242424;
            color: #EEE;

            p {
                padding: 2em;
                font-size: 18px;
            }
        }
    }
</style>
<script src="https://tinylytics.app/embed/ymKy7embDzqpj9NARJqA.js" defer></script>
</html>
